<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doppelganger</title>
    <meta
      name="description"
      content="Doppelganger is an agent platform coming soon."
    >
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f4ef;
        --fg: #171717;
        --muted: #68615a;
        --accent: #c9562f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background: var(--bg);
        color: var(--fg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 720px);
      }

      .mark {
        width: 44px;
        height: 44px;
        margin-bottom: 32px;
        border: 2px solid currentColor;
        border-radius: 50%;
        position: relative;
      }

      .mark::after {
        content: "";
        position: absolute;
        inset: 8px;
        border: 2px solid var(--accent);
        border-radius: 50%;
      }

      p {
        margin: 0;
      }

      .eyebrow {
        margin-bottom: 16px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 10ch;
        margin: 0 0 20px;
        font-size: clamp(3.5rem, 12vw, 8.5rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .lede {
        max-width: 560px;
        color: var(--muted);
        font-size: clamp(1.2rem, 2.6vw, 1.7rem);
        line-height: 1.45;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #11100e;
          --fg: #f7f4ef;
          --muted: #b9afa5;
          --accent: #f0784d;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="Doppelganger coming soon">
      <div class="mark" aria-hidden="true"></div>
      <p class="eyebrow">Doppelganger</p>
      <h1>Agent platform.</h1>
      <p class="lede">Coming soon.</p>
    </main>
  </body>
</html>

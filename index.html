<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doppelganger</title>
    <meta
      name="description"
      content="Doppelganger."
    >
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --fg: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: clamp(24px, 7vw, 48px);
        background: var(--bg);
        color: var(--fg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 1320px);
        text-align: center;
      }

      h1 {
        margin: 0;
        color: var(--fg);
        font-size: clamp(2rem, 8.5vw, 9rem);
        font-weight: 900;
        line-height: 1;
        letter-spacing: clamp(0.01em, 0.45vw, 0.04em);
        text-transform: uppercase;
        overflow-wrap: normal;
        white-space: nowrap;
        background:
          linear-gradient(
            110deg,
            #ffffff 0%,
            #a6a6a6 18%,
            #ffffff 34%,
            #d9d9d9 52%,
            #ffffff 68%,
            #7c7c7c 84%,
            #ffffff 100%
          );
        background-size: 220% 100%;
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.24));
        animation: shine 5s ease-in-out infinite;
      }

      p {
        margin: clamp(16px, 4vw, 24px) 0 0;
        color: rgba(255, 255, 255, 0.72);
        font-size: clamp(0.7rem, 2.8vw, 1rem);
        font-weight: 600;
        letter-spacing: clamp(0.14em, 1.6vw, 0.22em);
        text-transform: uppercase;
      }

      @keyframes shine {
        0%,
        100% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        h1 {
          animation: none;
        }
      }

      @media (max-width: 520px) {
        h1 {
          font-size: clamp(1.55rem, 8.6vw, 3.25rem);
          letter-spacing: 0;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="Doppelganger">
      <h1>DOPPELGANGER</h1>
      <p>Coming soon</p>
    </main>
  </body>
</html>

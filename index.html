<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doppelganger</title>
    <meta
      name="description"
      content="Doppelganger."
    >
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --fg: #000000;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background: var(--bg);
        color: var(--fg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 9rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <main aria-label="Doppelganger">
      <h1>doppelganger</h1>
    </main>
  </body>
</html>
